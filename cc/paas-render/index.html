<!DOCTYPE html>
<html>
<head>
    <title>Students</title>
</head>

<body>

<h1>Student List</h1>

<div id="data"></div>

<script>

fetch('/students')
.then(res => res.json())
.then(data => {

    let output = "";

    data.forEach(student => {
        output += `
            <p>${student.id} - ${student.name}</p>
        `;
    });

    document.getElementById('data').innerHTML = output;

});

</script>

</body>
</html>
